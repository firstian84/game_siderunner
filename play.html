<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiddow Runner - Background Parallax</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        #game-container {
            width: 100vw;
            height: 100vh;
            background-image: url('https://firstian84.github.io/game/bg.png');
            background-size: 100% 100%; 
            background-position: center;
            background-repeat: repeat-x; /* Diubah ke repeat-x agar gambar menyambung saat bergerak */
            position: relative;
        }

        #floor {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 0px;
            background-color: #3e2723;
            border-top: 4px solid #2d1b18;
            z-index: 5;
        }

        #player {
            width: 200px; 
            height: 200px; 
            position: absolute;
            bottom: -20px; 
            left: 50px;
            background-size: 1000px 1000px; 
            background-repeat: no-repeat;
            z-index: 10;
            will-change: transform, left; 
        }

        .ui-panel {
            color: white;
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 50px;
            font-family: 'Arial', sans-serif;
            font-size: 14px;
            pointer-events: none;
            z-index: 100;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

    <div class="ui-panel">
        🎮 <strong>Kontrol:</strong> Gunakan Panah Kanan/Kiri
    </div>

    <div id="game-container">
        <div id="player"></div>
        <div id="floor"></div>
    </div>

    <script>
        const player = document.getElementById('player');
        const gameContainer = document.getElementById('game-container'); // Referensi container
        
        const spriteSize = 200;
        const totalFrames = 25;
        const columns = 5;
        
        const URL_IDLE = 'https://firstian84.github.io/game/firstianKIDDOW-idle.png';
        const URL_RUN = 'https://firstian84.github.io/game/firstianKIDDOW-run.png';

        let currentFrame = 0;
        let posX = 50;
        let bgPosX = 0; // Variabel baru untuk posisi X background
        let isRunning = false;
        let direction = 1; 

        const preImgIdle = new Image(); preImgIdle.src = URL_IDLE;
        const preImgRun = new Image(); preImgRun.src = URL_RUN;

        player.style.backgroundImage = `url('${URL_IDLE}')`;

        function animateSprite() {
            const col = currentFrame % columns;
            const row = Math.floor(currentFrame / columns);
            
            const xPos = col * spriteSize;
            const yPos = row * spriteSize;

            player.style.backgroundPosition = `-${xPos}px -${yPos}px`;
            currentFrame = (currentFrame + 1) % totalFrames;
        }

        function update() {
            if (isRunning) {
                posX += (2 * direction); 
                
                // Menggerakkan background berlawanan arah dengan lari (efek parallax)
                bgPosX -= (1 * direction); 
                gameContainer.style.backgroundPosition = `${bgPosX}px center`;
                
                if (posX < -60) posX = -60; 
                if (posX > window.innerWidth - (spriteSize - 60)) {
                    posX = window.innerWidth - (spriteSize - 60);
                }
                
                player.style.left = posX + 'px';
                player.style.backgroundImage = `url('${URL_RUN}')`;
            } else {
                player.style.backgroundImage = `url('${URL_IDLE}')`;
            }
            
            player.style.transform = `scaleX(${direction})`;
            requestAnimationFrame(update);
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') {
                isRunning = true;
                direction = 1;
            } else if (e.key === 'ArrowLeft') {
                isRunning = true;
                direction = -1;
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
                isRunning = false;
            }
        });

        setInterval(animateSprite, 50);
        update();

        window.addEventListener('resize', () => {
            if (posX > window.innerWidth) {
                posX = window.innerWidth - spriteSize;
            }
        });
    </script>
</body>
</html>
